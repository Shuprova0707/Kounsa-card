name: Weekly rates refresh

on:
  schedule:
    - cron: "30 2 * * 1"   # every Monday 02:30 UTC = 08:00 IST
  workflow_dispatch: {}     # lets you run it manually from the Actions tab

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh rates.json and brands.json via Gemini
        run: node scripts/update.mjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and push if anything changed
        run: |
          git config user.name "kounsa-bot"
          git config user.email "actions@users.noreply.github.com"
          git add rates.json brands.json
          if git diff --cached --quiet; then
            echo "No changes this week."
          else
            git commit -m "auto: weekly rates refresh $(date +%F)"
            git push
          fi
